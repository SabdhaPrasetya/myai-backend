<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MyAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#212121;--sb:#171717;--sur:#2f2f2f;--sur2:#3a3a3a;--bor:#3d3d3d;--txt:#ececec;--txt2:#b4b4b4;--mut:#6e6e80;--ac:#19c37d;--ac2:#ab68ff;--cbg:#1a1a1a;--red:#ef4444;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
body{background:var(--bg);color:var(--txt);font-size:15px;}

/* LOGIN PAGE */
#loginPage{position:fixed;inset:0;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
#loginPage.hide{display:none;}
.login-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:32px 28px;width:100%;max-width:380px;position:relative;z-index:1;}
.login-logo{width:56px;height:56px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.login-title{text-align:center;font-size:24px;font-weight:700;margin-bottom:6px;}
.login-sub{text-align:center;color:rgba(255,255,255,0.5);font-size:13px;margin-bottom:28px;}
.login-tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;margin-bottom:22px;gap:4px;}
.ltab{flex:1;padding:11px;text-align:center;border-radius:7px;cursor:pointer;font-size:14px;font-weight:600;color:rgba(255,255,255,0.5);transition:all 0.2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;}
.ltab.on{background:rgba(255,255,255,0.1);color:#fff;}
.linput{width:100%;padding:13px 14px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:14px;margin-bottom:12px;outline:none;transition:border-color 0.2s;}
.linput:focus{border-color:var(--ac);}
.linput::placeholder{color:rgba(255,255,255,0.3);}
.lbtn{width:100%;padding:16px;background:linear-gradient(135deg,var(--ac),#0ea5e9);border:none;border-radius:10px;color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:block;position:relative;z-index:10;}
.lbtn:active{opacity:0.8;}
.lmsg{display:none;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-bottom:10px;}
.lmsg.ok{background:rgba(25,195,125,0.15);color:#19c37d;border:1px solid #19c37d;}
.lmsg.err{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #f87171;}
.ldivider{text-align:center;color:rgba(255,255,255,0.3);font-size:12px;margin:12px 0;position:relative;}
.ldivider::before,.ldivider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(255,255,255,0.1);}
.ldivider::before{left:0;}.ldivider::after{right:0;}
.lskip{width:100%;padding:14px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.7);font-size:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;display:block;position:relative;z-index:10;}

/* SETUP PAGE */
#setupPage{position:fixed;inset:0;background:#111827;z-index:998;overflow-y:auto;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px;}
#setupPage.hide{display:none;}
.setup-card{background:#1f2937;border-radius:16px;padding:26px;width:100%;max-width:400px;border:1px solid #374151;margin-top:16px;}
.setup-icon{font-size:36px;text-align:center;margin-bottom:12px;}
.setup-title{color:#fff;text-align:center;font-size:20px;font-weight:700;margin-bottom:6px;}
.setup-sub{color:#9ca3af;text-align:center;font-size:13px;margin-bottom:22px;line-height:1.5;}
.slabel{display:block;color:#9ca3af;font-size:11px;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.05em;}
.sinput{width:100%;padding:13px;background:#111827;border:2px solid #374151;border-radius:10px;color:#fff;font-size:14px;margin-bottom:16px;outline:none;}
.sinput:focus{border-color:var(--ac);}
.smsg{display:none;padding:10px;border-radius:8px;font-size:13px;text-align:center;margin-bottom:14px;}
.smsg.ok{background:rgba(25,195,125,0.15);color:#19c37d;border:1px solid #19c37d;}
.smsg.err{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid #f87171;}
.sbsave{width:100%;padding:15px;background:var(--ac);border:none;border-radius:11px;color:#000;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px;}
.sbsave:active{opacity:0.85;}
.snote{color:#6b7280;font-size:12px;text-align:center;}
.snote a{color:var(--ac);}

/* APP */
#app{display:none;height:100vh;flex-direction:column;overflow:hidden;}
#app.show{display:flex;}
.app-inner{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:240px;background:var(--sb);border-right:1px solid var(--bor);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);transition:transform 0.25s;z-index:200;}
.sidebar.open{transform:translateX(0);}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:199;}
.sb-overlay.show{display:block;}
.sb-top{padding:12px 10px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.brand{display:flex;align-items:center;gap:8px;}
.brand-ico{width:30px;height:30px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
.brand-name{font-size:15px;font-weight:700;color:#fff;}
.sb-x{background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;padding:4px;line-height:1;border-radius:6px;}
.sb-x:hover,.sb-x:active{color:var(--txt);background:var(--sur);}
.new-btn{margin:8px;padding:9px 12px;background:var(--sur);border:1px solid var(--bor);border-radius:8px;color:var(--txt2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.15s;}
.new-btn:hover,.new-btn:active{background:var(--sur2);color:var(--txt);}
.sb-sec{padding:8px 12px 3px;font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:0.06em;}
.chat-list{flex:1;overflow-y:auto;padding:3px 6px;}
.chat-item{padding:8px 10px;border-radius:7px;cursor:pointer;color:var(--txt2);font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:5px;margin-bottom:2px;}
.chat-item:hover,.chat-item.on{background:var(--sur);color:var(--txt);}
.ci-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.del-btn{opacity:0;background:none;border:none;color:var(--mut);font-size:12px;cursor:pointer;padding:2px 4px;border-radius:3px;flex-shrink:0;}
.chat-item:hover .del-btn{opacity:1;}
.del-btn:hover{color:var(--red);}
.sb-bot{padding:10px;border-top:1px solid var(--bor);display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.sb-uname{padding:6px 8px;color:var(--txt2);font-size:12px;display:flex;align-items:center;gap:7px;}
.uavatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0;}
.sb-status{display:flex;align-items:center;gap:7px;padding:4px 8px;}
.sdot{width:6px;height:6px;border-radius:50%;}
.sdot.on{background:var(--ac);box-shadow:0 0 4px var(--ac);}
.sdot.off{background:var(--red);}
.stxt{font-size:11px;color:var(--mut);}
.sb-btn{padding:8px 10px;background:transparent;border:1px solid var(--bor);border-radius:7px;color:var(--mut);font-size:12px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.sb-btn:hover,.sb-btn:active{border-color:var(--ac);color:var(--ac);}
.sb-btn.red:hover,.sb-btn.red:active{border-color:var(--red);color:var(--red);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;width:100%;}
.topbar{padding:11px 14px;border-bottom:1px solid var(--bor);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0;}
.menu-btn{background:none;border:none;color:var(--txt2);font-size:22px;cursor:pointer;padding:4px;border-radius:6px;-webkit-tap-highlight-color:transparent;}
.tb-title{font-size:15px;font-weight:600;color:var(--txt);}
.model-tag{padding:4px 10px;background:var(--sur);border:1px solid var(--bor);border-radius:100px;font-size:11px;color:var(--mut);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bor);background:var(--bg);flex-shrink:0;}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.tab.on{color:var(--ac);border-bottom-color:var(--ac);}

/* CHAT */
#chatView{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
#chatView.hide{display:none!important;}
.msgs{flex:1;overflow-y:auto;min-height:0;}
.mwrap{max-width:700px;margin:0 auto;padding:0 14px;}
.msg{margin-bottom:20px;animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.mav{width:27px;height:27px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.mav.ai{background:linear-gradient(135deg,var(--ac),var(--ac2));color:#000;}
.mav.user{background:var(--sur2);color:var(--txt);}
.mname{font-size:13px;font-weight:600;color:var(--txt2);}
.mtime{font-size:11px;color:var(--mut);margin-left:3px;}
.mc{padding-left:35px;font-size:14px;line-height:1.75;color:var(--txt);}
.mc p{margin-bottom:10px;}
.mc p:last-child{margin-bottom:0;}
.mc ul,.mc ol{padding-left:18px;margin-bottom:10px;}
.mc li{margin-bottom:4px;}
.mc strong{color:#fff;}
.mimg{max-width:260px;max-height:180px;border-radius:9px;margin-bottom:8px;border:1px solid var(--bor);display:block;}
.fchip{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:var(--sur);border:1px solid var(--bor);border-radius:6px;font-size:12px;color:var(--txt2);margin-bottom:7px;}
.ic{background:var(--sur2);padding:1px 5px;border-radius:3px;font-family:monospace;font-size:12px;color:#a78bfa;}

/* NOTICES */
.notice{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;border-radius:10px;margin-bottom:8px;font-size:13px;line-height:1.6;}
.notice.warn{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.notice.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.nico{font-size:16px;flex-shrink:0;margin-top:1px;}
.rbtn{margin-top:8px;padding:6px 13px;background:var(--ac);border:none;border-radius:7px;color:#000;font-weight:700;font-size:12px;cursor:pointer;}
.cd{font-family:monospace;font-weight:700;color:#f59e0b;}

/* VOICE */
.vbub{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;background:var(--sur);border:1px solid var(--bor);border-radius:16px;margin-bottom:7px;}
.vplay{width:26px;height:26px;background:var(--ac);border-radius:50%;border:none;cursor:pointer;color:#000;font-size:10px;display:flex;align-items:center;justify-content:center;}
.vbars{display:flex;align-items:center;gap:2px;height:16px;}
.vbar{width:2px;background:var(--ac);border-radius:2px;opacity:0.7;}
.vdur{font-size:11px;color:var(--mut);}

/* CODE */
.cw{background:var(--cbg);border-radius:9px;overflow:hidden;margin:9px 0;border:1px solid var(--bor);}
.ct{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#111;border-bottom:1px solid var(--bor);}
.ct-l{display:flex;align-items:center;gap:6px;}
.clang{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:0.04em;}
.cfname{font-size:11px;color:var(--ac);background:rgba(25,195,125,0.1);padding:2px 7px;border-radius:4px;cursor:pointer;border:1px solid rgba(25,195,125,0.2);}
.cacts{display:flex;gap:4px;}
.cbtn{padding:3px 8px;background:var(--sur);border:none;border-radius:4px;color:var(--txt2);font-size:11px;cursor:pointer;}
.cbtn.dl{background:rgba(25,195,125,0.1);color:var(--ac);}
.cbtn.prev{background:rgba(171,104,255,0.1);color:var(--ac2);}
.cbody{padding:12px;overflow-x:auto;font-family:monospace;font-size:12px;line-height:1.6;color:#e2e8f0;white-space:pre;max-height:280px;overflow-y:auto;}

/* FOLDER */
.folder-card{background:var(--sur);border:1px solid var(--bor);border-radius:10px;padding:12px 14px;margin-top:9px;}
.folder-top{display:flex;align-items:center;gap:7px;margin-bottom:9px;font-weight:600;font-size:13px;}
.folder-files{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.ff{display:flex;align-items:center;gap:7px;padding:6px 9px;background:var(--cbg);border-radius:6px;font-size:12px;color:var(--txt2);cursor:pointer;border:1px solid transparent;}
.ff:hover,.ff:active{border-color:var(--ac);color:var(--txt);}
.fdl{width:100%;padding:9px;background:var(--ac);border:none;border-radius:7px;color:#000;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}

/* PREVIEW */
#previewView{flex:1;display:none;flex-direction:column;}
#previewView.show{display:flex;}
.pv-toolbar{padding:8px 12px;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px;background:var(--sb);flex-shrink:0;flex-wrap:wrap;}
.pv-title{font-size:13px;color:var(--txt2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pv-btn{padding:6px 12px;background:var(--sur);border:1px solid var(--bor);border-radius:7px;color:var(--txt2);font-size:12px;cursor:pointer;white-space:nowrap;}
.pv-btn:hover,.pv-btn:active{background:var(--sur2);color:var(--txt);}
.pv-btn.ac{background:rgba(25,195,125,0.15);border-color:var(--ac);color:var(--ac);}
#previewFrame{flex:1;border:none;background:#fff;width:100%;}
.pv-empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--mut);text-align:center;padding:20px;}
.pv-empty-ico{font-size:48px;opacity:0.3;}

/* FILE VIEWER */
#fv{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;align-items:center;justify-content:center;padding:12px;}
#fv.show{display:flex;}
.fv-box{background:#1a1a2e;border:1px solid var(--bor);border-radius:12px;width:100%;max-width:660px;max-height:88vh;display:flex;flex-direction:column;}
.fv-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#111;border-bottom:1px solid var(--bor);border-radius:12px 12px 0 0;}
.fv-name{font-size:13px;color:var(--ac);font-family:monospace;}
.fv-acts{display:flex;gap:6px;align-items:center;}
.fv-btn{padding:4px 10px;background:var(--sur);border:none;border-radius:5px;color:var(--txt2);font-size:11px;cursor:pointer;}
.fv-btn.dl{background:rgba(25,195,125,0.1);color:var(--ac);}
.fv-cls{background:none;border:none;color:var(--mut);font-size:20px;cursor:pointer;line-height:1;padding:0 4px;}
.fv-body{overflow-y:auto;padding:14px;font-family:monospace;font-size:12px;line-height:1.6;color:#e2e8f0;white-space:pre;flex:1;}

/* WELCOME */
.welcome{max-width:500px;margin:0 auto;padding:40px 16px 0;text-align:center;}
.wico{width:56px;height:56px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;box-shadow:0 6px 20px rgba(25,195,125,0.25);}
.welcome h1{font-size:23px;font-weight:700;margin-bottom:9px;}
.welcome p{color:var(--mut);font-size:13px;line-height:1.7;margin-bottom:18px;}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;}
.chip{padding:7px 13px;background:var(--sur);border:1px solid var(--bor);border-radius:100px;font-size:12px;color:var(--txt2);cursor:pointer;}
.chip:hover,.chip:active{border-color:var(--ac);color:var(--ac);}

/* TYPING */
.tw{display:flex;padding-left:35px;align-items:center;gap:4px;}
.td{width:6px;height:6px;background:var(--mut);border-radius:50%;animation:tb 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-6px);opacity:1}}

/* INPUT */
.iarea{padding:9px 14px 12px;background:var(--bg);border-top:1px solid var(--bor);flex-shrink:0;}
.att-p{max-width:700px;margin:0 auto 7px;display:flex;flex-wrap:wrap;gap:6px;}
.att-t{position:relative;display:inline-flex;}
.att-t img{width:48px;height:48px;object-fit:cover;border-radius:7px;border:1px solid var(--bor);}
.att-fp{padding:6px 9px;background:var(--sur);border:1px solid var(--bor);border-radius:6px;font-size:11px;color:var(--txt2);max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.att-rm{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--red);border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:9px;display:flex;align-items:center;justify-content:center;}
.ibox{max-width:700px;margin:0 auto;background:var(--sur);border:1.5px solid var(--bor);border-radius:12px;display:flex;align-items:flex-end;gap:4px;padding:8px 10px;transition:border-color .2s;}
.ibox:focus-within{border-color:var(--ac);}
.ia{width:32px;height:32px;background:transparent;border:none;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--mut);flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.ia:hover,.ia:active{background:var(--sur2);}
.ia.rec{color:var(--red);animation:prec 1s infinite;}
@keyframes prec{0%,100%{opacity:1}50%{opacity:.3}}
#mi{flex:1;background:transparent;border:none;outline:none;font-size:14px;color:var(--txt);resize:none;max-height:140px;line-height:1.5;min-height:22px;font-family:-apple-system,sans-serif;}
#mi::placeholder{color:var(--mut);}
.sndbtn{width:32px;height:32px;background:var(--ac);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#000;font-size:15px;font-weight:700;-webkit-tap-highlight-color:transparent;}
.sndbtn:active{opacity:.8;}
.sndbtn:disabled{opacity:.3;cursor:not-allowed;}
.hint{text-align:center;font-size:11px;color:var(--mut);margin-top:6px;}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--sur2);border-radius:100px}
</style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo">✦</div>
    <div class="login-title">MyAI</div>
    <div class="login-sub">Asisten AI cerdas untuk belajar & berkreasi</div>
    <div class="login-tabs">
      <div class="ltab on" id="tabLogin">Masuk</div>
      <div class="ltab" id="tabReg">Daftar</div>
    </div>
    <div id="lmsg" class="lmsg"></div>
    <input class="linput" type="text" id="luname" placeholder="Username" autocomplete="off">
    <input class="linput" type="password" id="lpwd" placeholder="Password">
    <input class="linput" id="lpwd2" type="password" placeholder="Konfirmasi Password" style="display:none">
    <button class="lbtn" id="lbtn">Masuk</button>
    <div class="ldivider">atau</div>
    <button class="lskip" id="lskip">Lanjut tanpa akun</button>
  </div>
</div>

<!-- SETUP PAGE -->
<div id="setupPage" class="hide">
  <div class="setup-card">
    <div class="setup-icon">⚙️</div>
    <div class="setup-title">Setup API</div>
    <div class="setup-sub">Masukkan URL Vercel dan API key Groq gratis kamu</div>
    <span class="slabel">URL Backend Vercel</span>
    <input class="sinput" type="url" id="urlI" placeholder="https://myai-backend-kappa.vercel.app">
    <span class="slabel">API Key Groq</span>
    <input class="sinput" type="text" id="keyI" placeholder="gsk_x
