<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyAI</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#212121;--sidebar:#171717;--surface:#2f2f2f;--surface2:#3a3a3a;
  --border:#3d3d3d;--text:#ececec;--text2:#b4b4b4;--muted:#6e6e80;
  --accent:#19c37d;--accent2:#ab68ff;--input-bg:#2f2f2f;
  --code-bg:#1a1a1a;--danger:#ef4444;--warning:#f59e0b;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.hidden{display:none;}
.modal{background:#1e1e2e;border:1px solid #3d3d3d;border-radius:16px;padding:28px;max-width:400px;width:100%;position:relative;z-index:9001;}
.modal-icon{font-size:36px;text-align:center;margin-bottom:12px;}
.modal h2{font-size:20px;font-weight:600;text-align:center;margin-bottom:6px;}
.modal-desc{color:var(--muted);font-size:13px;text-align:center;line-height:1.6;margin-bottom:20px;}
.modal-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;display:block;font-family:'JetBrains Mono',monospace;}
.modal-input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color 0.2s;margin-bottom:14px;}
.modal-input:focus{border-color:var(--accent);}
.modal-btn{width:100%;padding:18px;background:#19c37d;border:none;border-radius:10px;color:#000;font-size:16px;font-weight:700;cursor:pointer;display:block;margin-bottom:10px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
.modal-btn:hover{opacity:0.9;}
.modal-hint{font-size:12px;color:var(--muted);text-align:center;line-height:1.7;}
.modal-hint a{color:var(--accent);text-decoration:none;}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR OVERLAY (mobile) */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
.sb-overlay.show{display:block;}

/* SIDEBAR */
.sidebar{
  width:260px;flex-shrink:0;background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;
  transition:transform 0.25s ease;z-index:100;
}
.sb-head{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.brand{display:flex;align-items:center;gap:9px;}
.brand-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.brand-name{font-size:16px;font-weight:600;}
.sb-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;border-radius:6px;line-height:1;transition:color 0.15s;}
.sb-close:hover{color:var(--text);}

.new-btn{margin:10px 10px 4px;padding:9px 14px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text2);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;width:calc(100% - 20px);}
.new-btn:hover{background:var(--surface2);color:var(--text);}

.sb-section{padding:10px 14px 4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-family:'JetBrains Mono',monospace;}

.chat-list{flex:1;overflow-y:auto;padding:4px 8px;}
.chat-item{padding:9px 10px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all 0.15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;justify-content:space-between;gap:6px;}
.chat-item:hover{background:var(--surface);}
.chat-item.active{background:var(--surface);color:var(--text);}
.chat-item-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.del-btn{opacity:0;background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;border-radius:4px;flex-shrink:0;transition:all 0.15s;line-height:1;}
.chat-item:hover .del-btn{opacity:1;}
.del-btn:hover{color:var(--danger);background:rgba(239,68,68,0.1);}

.sb-foot{padding:12px;border-top:1px solid var(--border);}
.status-row{display:flex;align-items:center;gap:8px;padding:6px 4px;margin-bottom:8px;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sdot.on{background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 2s infinite;}
.sdot.off{background:var(--danger);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.stxt{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.cfg-btn{width:100%;padding:8px 12px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;text-align:left;display:flex;align-items:center;gap:8px;}
.cfg-btn:hover{border-color:var(--accent);color:var(--accent);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* TOPBAR */
.topbar{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0;}
.topbar-l{display:flex;align-items:center;gap:10px;}
.menu-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;border-radius:6px;transition:color 0.15s;}
.menu-btn:hover{color:var(--text);}
.topbar-title{font-size:15px;font-weight:600;}
.model-tag{padding:4px 10px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

/* MESSAGES */
.messages{flex:1;overflow-y:auto;padding:28px 0;}
.mwrap{max-width:760px;margin:0 auto;padding:0 18px;}
.message{margin-bottom:22px;animation:fi 0.25s ease;}
@keyframes fi{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.mhead{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mav{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:600;}
.mav.ai{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#000;font-size:15px;}
.mav.user{background:var(--surface2);color:var(--text);}
.mname{font-size:13px;font-weight:600;color:var(--text2);}
.mtime{font-size:11px;color:var(--muted);margin-left:4px;font-family:'JetBrains Mono',monospace;}
.mcont{padding-left:38px;color:var(--text);font-size:15px;line-height:1.75;}
.mcont p{margin-bottom:12px;}
.mcont p:last-child{margin-bottom:0;}
.mcont ul,.mcont ol{padding-left:22px;margin-bottom:12px;}
.mcont li{margin-bottom:5px;}
.mcont strong{color:#fff;}
.mcont a{color:var(--accent);}
.msg-img{max-width:300px;max-height:220px;border-radius:10px;margin-bottom:10px;border:1px solid var(--border);display:block;}
.fchip{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);margin-bottom:10px;}

/* NOTICES */
.notice{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;border-radius:12px;margin-bottom:10px;font-size:14px;line-height:1.6;}
.notice.warn{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);color:#fbbf24;}
.notice.err{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;}
.nicon{font-size:18px;flex-shrink:0;margin-top:1px;}
.rbtn{margin-top:10px;padding:7px 16px;background:var(--accent);border:none;border-radius:8px;color:#000;font-weight:600;font-size:13px;cursor:pointer;font-family:'Inter',sans-serif;}
.cd{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--warning);}

/* VOICE */
.vbub{display:inline-flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;margin-bottom:8px;}
.vplay{width:28px;height:28px;background:var(--accent);border-radius:50%;border:none;cursor:pointer;color:#000;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vbars{display:flex;align-items:center;gap:2px;height:20px;}
.vbar{width:3px;background:var(--accent);border-radius:2px;opacity:0.7;}
.vdur{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}

/* ===== CODE BLOCK (mirip Claude) ===== */
.code-wrap{background:var(--code-bg);border-radius:10px;overflow:hidden;margin:12px 0;border:1px solid var(--border);}
.code-top{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;background:#111;border-bottom:1px solid var(--border);}
.code-info{display:flex;align-items:center;gap:8px;}
.code-lang{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.code-fname{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:rgba(25,195,125,0.1);padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid rgba(25,195,125,0.2);transition:all 0.15s;}
.code-fname:hover{background:rgba(25,195,125,0.2);}
.code-acts{display:flex;gap:6px;}
.cbtn{padding:4px 10px;background:var(--surface);border:none;border-radius:5px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;}
.cbtn:hover{background:var(--surface2);color:var(--text);}
.cbtn.dl{background:rgba(25,195,125,0.12);color:var(--accent);}
.cbtn.dl:hover{background:rgba(25,195,125,0.22);}
.code-body{padding:16px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#e2e8f0;white-space:pre;}

/* Collapsed code (click to expand) */
.code-body.collapsed{max-height:120px;overflow:hidden;position:relative;}
.code-body.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--code-bg));}
.code-expand{width:100%;padding:8px;background:#111;border:none;border-top:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:color 0.15s;}
.code-expand:hover{color:var(--text);}

/* Folder download */
.folder-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-top:12px;}
.folder-title{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-weight:600;font-size:14px;}
.folder-files{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.folder-file{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--code-bg);border-radius:7px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text2);cursor:pointer;transition:all 0.15s;border:1px solid transparent;}
.folder-file:hover{border-color:var(--accent);color:var(--text);}
.folder-file-icon{font-size:14px;flex-shrink:0;}
.folder-dl-btn{width:100%;padding:9px;background:var(--accent);border:none;border-radius:8px;color:#000;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.folder-dl-btn:hover{opacity:0.85;}

/* File viewer modal */
.fv-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:3000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.fv-overlay.hidden{display:none;}
.fv-modal{background:#1a1a2e;border:1px solid var(--border);border-radius:14px;width:100%;max-width:700px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;}
.fv-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:#111;}
.fv-fname{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--accent);}
.fv-actions{display:flex;gap:8px;align-items:center;}
.fv-btn{padding:5px 12px;background:var(--surface);border:none;border-radius:6px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.15s;}
.fv-btn:hover{background:var(--surface2);color:var(--text);}
.fv-btn.dl{background:rgba(25,195,125,0.15);color:var(--accent);}
.fv-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 6px;border-radius:6px;line-height:1;}
.fv-close:hover{color:var(--text);}
.fv-body{overflow-y:auto;padding:16px;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.65;color:#e2e8f0;white-space:pre;flex:1;}

/* Inline code */
.ic{background:var(--surface2);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#a78bfa;}

/* TYPING */
.typing-w{display:flex;padding-left:38px;align-items:center;gap:5px;}
.td{width:7px;height:7px;background:var(--muted);border-radius:50%;animation:tb 1.2s ease-in-out infinite;}
.td:nth-child(2){animation-delay:0.2s;}.td:nth-child(3){animation-delay:0.4s;}
@keyframes tb{0%,80%,100%{transform:translateY(0);opacity:.3;}40%{transform:translateY(-7px);opacity:1;}}

/* WELCOME */
.welcome{max-width:560px;margin:0 auto;padding:56px 24px 0;text-align:center;}
.wlogo{width:64px;height:64px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;box-shadow:0 8px 32px rgba(25,195,125,0.25);}
.welcome h1{font-size:27px;font-weight:600;margin-bottom:10px;}
.welcome p{color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:22px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.chip{padding:8px 15px;background:var(--surface);border:1px solid var(--border);border-radius:100px;font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;}
.chip:hover{border-color:var(--accent);color:var(--accent);background:rgba(25,195,125,0.08);}

/* INPUT */
.input-area{padding:10px 18px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.att-prev{max-width:760px;margin:0 auto 8px;display:flex;flex-wrap:wrap;gap:8px;}
.att-t{position:relative;display:inline-flex;}
.att-t img{width:54px;height:54px;object-fit:cover;border-radius:8px;border:1px solid var(--border);}
.att-fp{padding:7px 11px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.att-rm{position:absolute;top:-5px;right:-5px;width:17px;height:17px;background:var(--danger);border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;}
.ibox{max-width:760px;margin:0 auto;background:var(--input-bg);border:1px solid var(--border);border-radius:14px;display:flex;align-items:flex-end;gap:6px;padding:10px 12px;transition:border-color 0.2s,box-shadow 0.2s;}
.ibox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(25,195,125,0.12);}
.ia{width:34px;height:34px;background:transparent;border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);transition:all 0.15s;flex-shrink:0;}
.ia:hover{background:var(--surface2);color:var(--text);}
.ia.rec{color:var(--danger);animation:prec 1s infinite;}
@keyframes prec{0%,100%{opacity:1;}50%{opacity:0.3;}}
#mi{flex:1;background:transparent;border:none;outline:none;font-family:'Inter',sans-serif;font-size:15px;color:var(--text);resize:none;max-height:160px;line-height:1.5;min-height:24px;}
#mi::placeholder{color:var(--muted);}
.sbtn{width:34px;height:34px;background:var(--accent);border:none;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;color:#000;font-size:16px;font-weight:700;}
.sbtn:hover{opacity:0.85;transform:scale(1.05);}
.sbtn:disabled{opacity:0.3;cursor:not-allowed;transform:none;}
.hint{text-align:center;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:100px;}

@media(max-width:700px){
  .sidebar{position:fixed;transform:translateX(-100%);height:100vh;}
  .sidebar.open{transform:translateX(0);}
}
</style>
</head>
<body>

<!-- SETUP PAGE -->
<div id="mo" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;z-index:9999;overflow-y:auto;-webkit-overflow-scrolling:touch;">
  <div style="max-width:400px;margin:40px auto;padding:20px;">
    <div style="background:#16213e;border-radius:16px;padding:28px;border:1px solid #333;">
      <div style="font-size:36px;text-align:center;margin-bottom:12px;">⚙️</div>
      <h2 style="color:#fff;text-align:center;margin-bottom:8px;font-size:20px;font-family:sans-serif;">Setup MyAI</h2>
      <p style="color:#888;text-align:center;font-size:13px;margin-bottom:24px;font-family:sans-serif;">Masukkan URL Vercel dan API key Groq</p>
      <p style="color:#888;font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;font-family:sans-serif;">URL Backend Vercel</p>
      <input id="urlI" type="url" autocomplete="off" style="width:100%;padding:14px;background:#0f3460;border:2px solid #19c37d;border-radius:10px;color:#fff;font-size:14px;margin-bottom:16px;outline:none;display:block;font-family:sans-serif;" placeholder="https://myai-backend-kappa.vercel.app">
      <p style="color:#888;font-size:11px;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;font-family:sans-serif;">API Key Groq</p>
      <input id="keyI" type="text" autocomplete="off" style="width:100%;padding:14px;background:#0f3460;border:2px solid #333;border-radius:10px;color:#fff;font-size:14px;margin-bottom:20px;outline:none;display:block;font-family:sans-serif;" placeholder="gsk_xxxxxxxxxxxxxxxx">
      <div id="setupMsg" style="display:none;padding:12px;border-radius:8px;text-align:center;font-size:14px;margin-bottom:16px;font-family:sans-serif;"></div>
      <div id="saveBtn" onclick="saveSetup()" style="width:100%;padding:20px 0;background:#19c37d;border-radius:12px;color:#000;font-size:17px;font-weight:700;text-align:center;cursor:pointer;font-family:sans-serif;-webkit-tap-highlight-color:rgba(0,0,0,0);user-select:none;box-shadow:0 4px 15px rgba(25,195,125,0.4);">✓ Simpan &amp; Mulai</div>
      <p style="font-size:12px;color:#555;text-align:center;margin-top:14px;font-family:sans-serif;">Daftar Groq gratis → <a href="https://console.groq.com" target="_blank" style="color:#19c37d;">console.groq.com</a></p>
    </div>
  </div>
</div>


<!-- FILE VIEWER MODAL -->
<div class="fv-overlay hidden" id="fvo">
  <div class="fv-modal">
    <div class="fv-head">
      <span class="fv-fname" id="fvName">file.js</span>
      <div class="fv-actions">
        <button class="fv-btn" onclick="fvCopy()">Salin</button>
        <button class="fv-btn dl" onclick="fvDl()">⬇ Download</button>
        <button class="fv-close" onclick="closeFv()">✕</button>
      </div>
    </div>
    <div class="fv-body" id="fvBody"></div>
  </div>
</div>

<!-- SIDEBAR OVERLAY -->
<div class="sb-overlay" id="sbo" onclick="closeSidebar()"></div>

<div class="app">
  <!-- SI
